# Neural Network Configuration
network:
  architecture: "Neural Network"          # Name of the network architecture
  hidden_layer_dims:
    - 128


# Training Configuration
training:
  epochs: 50                   # Number of epochs
  train_batch_size: 64            # Batch size for training
  test_batch_size: 1000             # Batch size for training
  validation_batch_size: 64
  learning_rate: 0.001              # Learning rate
  optimizer: "Adam"                # Optimizer type
  weight_decay: 0.0001             # L2 Regularizer
  loss_type: "CrossEntropyLoss"
  scheduler_lr: "ReduceLROnPlateau"
  scheduler_patience: 5
  validation_percentage: 0.2


# Data Configuration
data:
  dataset: "MNIST"                 # Dataset name
  train_dim: 30000
  test_dim: 10000
  input_dim: 784
  output_dim: 10

# Weight Pruning Configuration
weight_pruning:
  wp_strength: 0.4

# Neuron Pruning Configuration
neuron_pruning:
  np_strength: 0.5
  batch_norm_decay: 0.001

# L1 Regularization Configuration
l1_sparse:
  l1_decay: 0.0001
